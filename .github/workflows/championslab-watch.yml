name: ChampionsLab roster watch

# Polls upstream ChampionsLab for the new-roster signature
# (Swampert + Wave Crash, or a Mega entry for one of the
# 2026-06-17 expansion Pokémon). When it hits, runs the
# refresh script and opens a PR with the updated learnsets
# so the maintainer just has to review + merge.
#
# Idempotent: a SHA-tagged branch is created per upstream
# revision; repeated runs against the same SHA short-circuit.

on:
  schedule:
    # Every 15 minutes — GitHub Actions cron can drift under
    # load, so don't bother going tighter.
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: championslab-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Probe upstream pokemon-data.ts
        id: probe
        run: |
          set -euo pipefail
          curl -sSf -A "Mozilla/5.0" \
            -o /tmp/upstream.ts \
            https://raw.githubusercontent.com/Andrew21P/ChampionsLab/main/src/lib/pokemon-data.ts
          SHA=$(sha256sum /tmp/upstream.ts | cut -c1-12)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

          # Single, high-precision signature: Swampert + Wave Crash.
          # User-confirmed: Swampert gains Wave Crash with the
          # 2026-06-17 in-game roster expansion. The combination
          # exists nowhere else in the Champions dataset, so a
          # single positive grep is reliable. Listing the new
          # mega keys is too noisy — some (e.g. Mega Metagross)
          # already have stray references in upstream.
          if grep -q '"Swampert"' /tmp/upstream.ts && \
             grep -qiE 'wavecrash|wave[ _]crash' /tmp/upstream.ts; then
            echo "hit=1" >> "$GITHUB_OUTPUT"
            echo "Signal HIT: Swampert + Wave Crash present (sha=$SHA)"
          else
            echo "hit=0" >> "$GITHUB_OUTPUT"
            echo "No signal (sha=$SHA)"
          fi

      - name: No signals — exit
        if: steps.probe.outputs.hit != '1'
        run: echo "No new-roster signals on upstream; nothing to do."

      - name: Skip if branch already pushed for this SHA
        if: steps.probe.outputs.hit == '1'
        id: branch_check
        run: |
          BRANCH="auto/championslab-${{ steps.probe.outputs.sha }}"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null; then
            echo "Branch $BRANCH already exists — earlier run handled this SHA."
            echo "skip=1" >> "$GITHUB_OUTPUT"
          else
            echo "skip=0" >> "$GITHUB_OUTPUT"
            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.probe.outputs.hit == '1' && steps.branch_check.outputs.skip == '0'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply ChampionsLab refresh
        if: steps.probe.outputs.hit == '1' && steps.branch_check.outputs.skip == '0'
        run: python3 tools/apply_championslab_learnsets.py --refresh

      - name: Push branch + surface PR link
        if: steps.probe.outputs.hit == '1' && steps.branch_check.outputs.skip == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Signal matched but apply produced no diff — already in sync."
            exit 0
          fi
          BRANCH="${{ steps.branch_check.outputs.branch }}"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git checkout -b "$BRANCH"
          git add tools/data/championslab.json assets/learnsets.json
          git commit -m "chore(learnsets): pull ChampionsLab refresh ${{ steps.probe.outputs.sha }}"
          git push origin "$BRANCH"
          # Try to create the PR. The default GITHUB_TOKEN often
          # can't because "Allow GitHub Actions to create and
          # approve pull requests" is off — in that case the
          # branch is still pushed and we surface a clickable
          # link in the run summary instead.
          PR_URL=""
          if gh pr create \
            --title "ChampionsLab learnset refresh (auto, ${{ steps.probe.outputs.sha }})" \
            --body  "Automated pull from upstream pokemon-data.ts (Swampert + Wave Crash signature triggered — new Champions roster has landed). Review the diff in assets/learnsets.json, then merge to drop the v1.12.5 \"learnset data not yet accurate\" notice." \
            --base main --head "$BRANCH" 2>/tmp/pr_err; then
            PR_URL=$(gh pr view "$BRANCH" --json url --jq .url)
          else
            echo "::warning::Auto PR creation blocked — enable 'Allow GitHub Actions to create and approve pull requests' under Settings → Actions → General."
            PR_URL="https://github.com/${{ github.repository }}/compare/main...${BRANCH}?expand=1"
          fi
          {
            echo "## ChampionsLab refresh ready"
            echo ""
            echo "Upstream signature hit (sha \`${{ steps.probe.outputs.sha }}\`). Branch pushed:"
            echo "- Branch: \`$BRANCH\`"
            echo "- Open / create PR: $PR_URL"
          } >> "$GITHUB_STEP_SUMMARY"
