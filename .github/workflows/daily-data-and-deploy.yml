name: Web deploy on data refresh

# The data REFRESH itself runs from a residential-IP cron on the
# home server (see tools/cron_daily_refresh.sh) — champs.pokedb.tokyo
# Cloudflare-blocks any datacenter IP that GitHub Actions would have.
# This workflow only handles the BUILD + PUBLISH half: whenever the
# cron pushes a new assets/champions_usage.json or assets/learnsets.json
# to main, rebuild the Flutter web bundle and ship it to gh-pages.
# Also runs on manual dispatch so a release can re-deploy without
# waiting for a data refresh.

on:
  push:
    branches: [main]
    paths:
      - 'assets/champions_usage.json'
      - 'assets/learnsets.json'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: web-deploy
  # Queue, don't cancel — overlapping deploys would race on gh-pages.
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build web (release)
        # `--pwa-strategy=none` because we ship a SW killer (next step),
        # not Flutter's offline-first service worker. `--base-href /`
        # because the site serves at damage-calc.com root via CNAME.
        run: flutter build web --release --base-href "/" --pwa-strategy=none

      - name: Apply SW killer
        # Replace Flutter's generated SW with one that unregisters
        # itself and purges all caches on activate. Migrates legacy
        # users who still have the old PWA SW cached.
        run: |
          cat > build/web/flutter_service_worker.js <<'EOF'
          self.addEventListener('install', (event) => { self.skipWaiting(); });
          self.addEventListener('activate', (event) => {
            event.waitUntil((async () => {
              try { const k = await caches.keys(); await Promise.all(k.map((x)=>caches.delete(x))); } catch (_) {}
              try { await self.registration.unregister(); } catch (_) {}
              const cl = await self.clients.matchAll({ type: 'window' });
              for (const c of cl) { try { c.navigate(c.url); } catch (_) {} }
            })());
          });
          EOF

      - name: Publish to gh-pages
        # Worktree-based deploy that preserves CNAME. NEVER let
        # android/ ios/ build/ pubspec.lock leak into the gh-pages
        # branch — only build/web/ contents + CNAME belong there.
        # Mirrors reference_deploy_procedure.
        run: |
          set -euo pipefail
          git fetch origin gh-pages
          git worktree add /tmp/ghpages-deploy gh-pages
          cp /tmp/ghpages-deploy/CNAME /tmp/CNAME-backup
          ( cd /tmp/ghpages-deploy && git rm -rf --quiet . )
          cp -r build/web/. /tmp/ghpages-deploy/
          cp /tmp/CNAME-backup /tmp/ghpages-deploy/CNAME
          ( cd /tmp/ghpages-deploy
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name  "github-actions[bot]"
            git add -A
            git commit -m "deploy: from ${GITHUB_SHA:0:7}"
            git push origin gh-pages )
          {
            echo "## ✅ Web deployed"
            echo ""
            echo "- Source: \`${GITHUB_SHA:0:7}\` (\`${GITHUB_REF_NAME}\`)"
            echo "- gh-pages: \`$(cd /tmp/ghpages-deploy && git rev-parse --short HEAD)\`"
          } >> "$GITHUB_STEP_SUMMARY"
