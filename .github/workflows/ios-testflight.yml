name: iOS TestFlight

on:
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        # Apple now requires the iOS 26 SDK (Xcode 26+) for App Store
        # Connect uploads, so pin to a Xcode 26.x toolchain instead of
        # whatever macos-latest happens to default to.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'

      - name: Install Apple certificate and provisioning profile
        env:
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          PROVISION_PROFILE_BASE64: ${{ secrets.IOS_APPSTORE_PROVISION_PROFILE_BASE64 }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/distribution.p12
          PROVISION_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$P12_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$PROVISION_PROFILE_BASE64" | base64 --decode -o $PROVISION_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PROVISION_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Update iOS project settings
        env:
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          cd ios
          ruby -e '
            path = "Runner.xcodeproj/project.pbxproj"
            content = File.read(path)
            team = ENV["TEAM_ID"]
            content.gsub!(/DEVELOPMENT_TEAM = .*;/, "DEVELOPMENT_TEAM = #{team};")
            unless content.include?("DEVELOPMENT_TEAM = #{team}")
              content.gsub!(/PRODUCT_BUNDLE_IDENTIFIER = com\.elyss\.damagecalc;/) do |m|
                "#{m}\n\t\t\t\tDEVELOPMENT_TEAM = #{team};"
              end
            end
            content.gsub!(/CODE_SIGN_STYLE = Automatic;/, "CODE_SIGN_STYLE = Manual;")
            content.gsub!(/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = .*;/, "")
            content.gsub!(/CODE_SIGN_IDENTITY = .*;/, "CODE_SIGN_IDENTITY = \"Apple Distribution\";")
            unless content.include?("CODE_SIGN_IDENTITY")
              content.gsub!(/DEVELOPMENT_TEAM = #{team};/) do |m|
                "#{m}\n\t\t\t\tCODE_SIGN_IDENTITY = \"Apple Distribution\";\n\t\t\t\tCODE_SIGN_STYLE = Manual;"
              end
            end
            content.gsub!(/PROVISIONING_PROFILE_SPECIFIER = .*?;/, "PROVISIONING_PROFILE_SPECIFIER = \"결정력 계산기\";")
            unless content.include?("PROVISIONING_PROFILE_SPECIFIER")
              content.gsub!(/CODE_SIGN_STYLE = Manual;/) do |m|
                "#{m}\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = \"결정력 계산기\";"
              end
            end
            File.write(path, content)
          '

      - name: Auto-increment build number
        run: |
          BUILD_NUMBER=${{ github.run_number }}
          sed -i '' "s/version: \(.*\)+.*/version: \1+${BUILD_NUMBER}/" pubspec.yaml
          echo "Build number: $BUILD_NUMBER"
          grep version pubspec.yaml

      - name: Build iOS IPA for App Store
        run: |
          flutter build ipa --release --export-options-plist=ios/ExportOptions-AppStore.plist

      - name: Save IPA as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 7

      - name: Upload to TestFlight
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo -n "$API_KEY_BASE64" | base64 --decode > ~/.private_keys/AuthKey_${API_KEY_ID}.p8

          xcrun altool --upload-app \
            --type ios \
            --file build/ios/ipa/*.ipa \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db
