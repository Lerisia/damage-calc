const CDN = 'https://play.pokemonshowdown.com/sprites/';

// (subdir, key, ext, zipPath)
function jobs() {
  const list = [];
  for (const k of POKEMON) {
    list.push(['gen5', k, 'png', `gen5/${k}.png`]);
    list.push(['dex', k, 'png', `dex/${k}.png`]);
    list.push(['pokemonicons', k, 'png', `pokemonicons/${k}.png`]);
  }
  for (const k of TRAINERS) {
    list.push(['trainers', k, 'png', `trainers/${k}.png`]);
  }
  return list;
}

const log = document.getElementById('log');
function out(msg) { log.textContent += '\n' + msg; log.scrollTop = log.scrollHeight; }

async function fetchOne(url) {
  const r = await fetch(url);
  if (!r.ok) return null;
  return await r.arrayBuffer();
}

async function run() {
  const btn = document.getElementById('go'); btn.disabled = true; btn.textContent = '진행 중…';
  const bar = document.getElementById('bar');
  const pct = document.getElementById('pct');
  const all = jobs();
  out(`총 ${all.length}개 파일.`);
  const zip = new JSZip();
  let done = 0, ok = 0, miss = 0;
  const CONC = 24;
  async function worker(arr) {
    while (arr.length) {
      const job = arr.shift();
      const [sub, key, ext, zipPath] = job;
      try {
        const buf = await fetchOne(CDN + sub + '/' + key + '.' + ext);
        if (buf) { zip.file(zipPath, buf); ok++; }
        else { miss++; }
      } catch (e) { miss++; }
      done++;
      const p = Math.floor(done * 100 / all.length);
      bar.value = p; pct.textContent = p + '%';
      if (done % 200 === 0) out(`진행 ${done}/${all.length} (성공 ${ok}, 누락 ${miss})`);
    }
  }
  const queue = all.slice();
  const workers = Array.from({length: CONC}, () => worker(queue));
  await Promise.all(workers);
  zip.file('VERSION', new Date().toISOString().slice(0,10));
  out(`다운로드 완료. ZIP 생성 중… (성공 ${ok} / 누락 ${miss})`);
  const blob = await zip.generateAsync({type:'blob', compression:'STORE'});
  out(`ZIP 크기: ${(blob.size/1024/1024).toFixed(1)} MB`);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'showdown-pack.zip';
  document.body.appendChild(a); a.click(); a.remove();
  btn.disabled = false; btn.textContent = '다시 받기';
  out('완료. 위에서 ZIP 다운로드가 시작됐어요.');
}

document.getElementById('go').addEventListener('click', () => { run().catch(e => out('오류: ' + e.message)); });
