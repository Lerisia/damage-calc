name: damage_calc
description: Battle damage calculator
publish_to: 'none'
version: 1.9.3+226

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  path_provider: ^2.1.0
  shared_preferences: ^2.5.4
  flutter_typeahead: ^5.2.0
  url_launcher: ^6.3.1
  archive: ^4.0.9
  # Validation pass for the deferred mobile sprite-pack import flow.
  # file_picker 8.1.4 caused Apple to silently drop iOS builds (see
  # feedback_file_picker_ios_silent_drop.md). file_selector is the
  # Flutter team's official package and is the safer retry candidate.
  # No code path uses it yet — first we confirm it doesn't trip the
  # same silent-drop behaviour on its own.
  file_selector: ^1.0.4
  # Photo-library picker for per-Pokémon overrides. Same Flutter-team
  # provenance as file_selector — used for the override flow only;
  # sprite-pack ZIP imports still go through file_selector (Files
  # app on iOS).
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
    - family: NotoSansKR
      fonts:
        - asset: assets/fonts/NotoSansKR-Fallback.ttf
    - family: MPLUSRounded1c
      fonts:
        - asset: assets/fonts/MPLUSRounded1c-Regular.ttf

  assets:
    - assets/
    - assets/fonts/
    - assets/pokemon/
    - assets/moves/
